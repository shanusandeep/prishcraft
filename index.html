<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="icon" href="data:," />
  <title>✨ SpellCraft</title>
</head>
<body>
  <div id="app"></div>

  <div id="hud">
    <div id="crosshair"></div>
    <div id="quest"></div>
    <div id="hearts"></div>
    <div id="bossbar" hidden><b id="boss-name"></b><div id="boss-track"><div id="boss-fill"></div></div></div>
    <div id="toast"></div>
    <button id="reset" title="Start a brand new island">🌱 New Island</button>
    <div id="left-hud">
      <button id="bag">🎒</button>
      <button id="trophies">🏆</button>
      <div id="items"></div>
    </div>
    <div id="dialogue" hidden>
      <b id="dlg-name"></b>
      <span id="dlg-hearts"></span>
      <p id="dlg-line"></p>
      <div id="dlg-replies"></div>
    </div>
    <div id="hotbar"></div>
    <button id="sel-chip" hidden></button>
  </div>

  <div id="awards" hidden>
    <div id="awards-card">
      <h2>🏆 Trophies</h2>
      <p id="awards-count"></p>
      <div id="awards-list"></div>
      <button id="awards-close">Done ✨</button>
    </div>
  </div>

  <div id="questions" hidden>
    <div id="q-card">
      <h2>❓ Ask them something</h2>
      <div id="q-list"></div>
      <button id="q-close">Never mind</button>
    </div>
  </div>

  <div id="inventory" hidden>
    <div id="inv-card">
      <h2>🧱 Your Blocks</h2>
      <p class="inv-sub">Tap a block to build with it. Gray ones still need mining!</p>
      <div id="inv-grid"></div>
      <div id="inv-items"></div>
      <button id="inv-close">Done ✨</button>
    </div>
  </div>

  <div id="craft" hidden>
    <div id="craft-card">
      <h2>🎒 Magic Crafting</h2>
      <div id="pouch"></div>
      <div id="recipes"></div>
      <label id="peaceful-row"><input type="checkbox" id="peaceful-box" /> 😴 Peaceful mode — enemies take a nap</label>
      <button id="shadow-row" hidden>🟣 Begin SHADOW-TOUCHED mode…</button>
      <p id="world-code"></p>
      <div id="coop-row">
        <button id="coop-host">👫 Friends can visit!</button>
        <button id="coop-join">🚪 Visit a friend…</button>
      </div>
      <p id="coop-status" hidden></p>
      <button id="coop-leave" hidden>👋 End the visit</button>
      <div id="file-row">
        <button id="save-export">📦 World → file</button>
        <button id="save-import">📂 File → world</button>
      </div>
      <input type="file" id="save-file" accept=".json,application/json" hidden />
      <button id="craft-close">Done ✨</button>
    </div>
  </div>

  <div id="touch-ui" hidden>
    <div id="look-zone"></div>
    <div id="joystick"><div id="knob"></div></div>
    <div id="touch-buttons">
      <button id="btn-inv">🧱<span>blocks</span></button>
      <button id="btn-talk" hidden>💬<span>talk</span></button>
      <button id="btn-fight" hidden>⚔️<span>fight!</span></button>
      <button id="btn-patronus" hidden>🦌<span>light!</span></button>
      <button id="btn-fly" hidden>🧹<span>fly</span></button>
      <button id="btn-break">⛏️<span>break</span></button>
      <button id="btn-place">🧱<span>place</span></button>
      <button id="btn-down" hidden>⬇️<span>sink</span></button>
      <button id="btn-jump">⬆️<span>jump</span></button>
    </div>
  </div>

  <div id="help">
    <div id="help-card">
      <h1>✨ SpellCraft</h1>
      <p class="subtitle">Your own magical island. Build anything!</p>
      <div id="help-keys"></div>
      <button id="start">Let's build! 🏝️</button>
      <p class="tiny">Your island saves all by itself ✨</p>
    </div>
  </div>

  <div id="fade"></div>
  <div id="hurt"></div>

  <div id="sleep" hidden>
    <div class="sleep-stars" aria-hidden="true">✦ ✧ ⭐ ✧ ✦</div>
    <div class="sleep-zzz">😴</div>
    <h2>Sleeping…</h2>
    <p id="sleep-count">Wake up in 60s</p>
    <button id="wake-btn" class="btn-like" disabled>Wake up ☀️</button>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
